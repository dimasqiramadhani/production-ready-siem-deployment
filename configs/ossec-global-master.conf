<!-- Master node only. Set <update_check> inside the existing <global> block in -->
<!-- /var/ossec/etc/ossec.conf on wazuh-master-01.                              -->
<!--                                                                            -->
<!-- The Wazuh API spawns a background task on the master that queries the Wazuh -->
<!-- Cloud Threat Intelligence (CTI) update service once per day. In an isolated -->
<!-- or air gapped lab there is no need to reach that service, so the check is    -->
<!-- disabled to keep the Server APIs page clean and avoid an outbound dependency.-->
<!--                                                                            -->
<!-- The default ossec.conf already ships an <update_check>yes</update_check>    -->
<!-- line inside <global>. Change yes to no rather than adding a second entry.   -->
<!-- Workers do not run this task, so this only needs to be set on the master.   -->

<global>
  <update_check>no</update_check>
</global>
