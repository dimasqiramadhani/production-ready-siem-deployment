# Wazuh - Filebeat configuration file
# Verified working on Wazuh 4.14.5 with Filebeat 7.10.2
# Replace <INDEXER_ADMIN_PASSWORD> with the admin password set during indexer install.
# The username stays "admin" (the built-in indexer admin user); only the password changes.
output.elasticsearch:
  hosts: ["https://192.168.90.111:9200", "https://192.168.90.113:9200", "https://192.168.90.114:9200"]
  protocol: https
  username: "admin"
  password: "<INDEXER_ADMIN_PASSWORD>"
  ssl.certificate_authorities:
    - /etc/filebeat/certs/root-ca.pem
  ssl.certificate: "/etc/filebeat/certs/filebeat.pem"
  ssl.key: "/etc/filebeat/certs/filebeat-key.pem"

setup.template.json.enabled: true
setup.template.json.path: '/etc/filebeat/wazuh-template.json'
setup.template.json.name: 'wazuh'
setup.ilm.overwrite: true
setup.ilm.enabled: false

filebeat.modules:
  - module: wazuh
    alerts:
      enabled: true
    archives:
      enabled: false

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
